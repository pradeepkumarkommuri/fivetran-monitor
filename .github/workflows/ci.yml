name: CI
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env: {POSTGRES_USER: monitor, POSTGRES_PASSWORD: monitor, POSTGRES_DB: fivetran_monitor}
        ports: ["5432:5432"]
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - run: pip install poetry==1.7.1 && poetry install --with dev
      - run: poetry run ruff check src/ tests/
      - run: poetry run pytest tests/unit/ -v --cov=src --cov-report=xml
        env:
          DATABASE_URL: postgresql+psycopg2://monitor:monitor@localhost:5432/fivetran_monitor
          FIVETRAN_API_KEY: test_key
          FIVETRAN_API_SECRET: test_secret
  docker:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - run: docker build -f Dockerfile.app -t fivetran-monitor:${{ github.sha }} .
      - run: docker build -f Dockerfile.spark -t fivetran-monitor-spark:${{ github.sha }} .
