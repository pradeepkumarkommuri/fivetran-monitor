# IMPORTANT: Replace values with base64-encoded secrets
# Generate: echo -n "yourvalue" | base64
apiVersion: v1
kind: Secret
metadata:
  name: fivetran-monitor-secrets
  namespace: fivetran-monitor
type: Opaque
data:
  FIVETRAN_API_KEY: <base64>
  FIVETRAN_API_SECRET: <base64>
  SMTP_PASSWORD: <base64>
  NTFY_ACCESS_TOKEN: <base64>
