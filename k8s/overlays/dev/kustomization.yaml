apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

bases:
  - ../../base

patches:
  - patch: |-
      - op: replace
        path: /data/APP_ENV
        value: "development"
      - op: replace
        path: /data/SCHEDULE_INTERVAL_MINUTES
        value: "5"
    target:
      kind: ConfigMap
      name: fivetran-monitor-config

images:
  - name: your-registry/fivetran-monitor
    newTag: "dev"
